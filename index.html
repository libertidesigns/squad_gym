<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Squad Gym</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Squad Gym">
<meta name="theme-color" content="#0A0A0F">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden}
body{background:#0A0A0F;font-family:'Inter',sans-serif;color:#F0F0F4;-webkit-font-smoothing:antialiased}
#root{display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}
.nav{position:fixed;bottom:0;left:0;right:0;height:60px;padding-bottom:env(safe-area-inset-bottom);background:rgba(10,10,15,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.05);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:opacity .1s;user-select:none;-webkit-user-select:none}
.nav-btn:active{opacity:.5}
.nav-lbl{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#3A3A52;transition:color .15s}
.nav-btn.on .nav-lbl{color:#E53935}
.nav-ico{transition:color .15s;color:#3A3A52}
.nav-btn.on .nav-ico{color:#E53935}
.card{background:#111118;border:1px solid #1E1E28;border-radius:16px;padding:16px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;border-radius:14px;transition:all .12s;user-select:none;-webkit-user-select:none;letter-spacing:.3px;height:52px;min-width:52px;font-size:14px;text-transform:uppercase}
.btn:active{transform:scale(.96);opacity:.85}
.btn-primary{background:#E53935;color:#fff;padding:0 24px}
.btn-secondary{background:#18181F;color:#F0F0F4;border:1px solid #1E1E28;padding:0 20px}
.btn-ghost{background:transparent;color:#E53935;padding:0 16px}
.btn-danger{background:rgba(229,57,53,.15);color:#E53935;border:1px solid rgba(229,57,53,.25);padding:0 20px}
.btn-sm{height:40px;font-size:12px;border-radius:10px;padding:0 16px}
.btn-row{display:grid;gap:10px}
.btn-row-2{grid-template-columns:1fr 1fr}
.btn-row-fill{grid-template-columns:1fr}
input,textarea{font-family:'Inter',sans-serif;background:#18181F;border:1px solid #1E1E28;color:#F0F0F4;border-radius:12px;padding:14px 16px;font-size:14px;width:100%;outline:none;transition:border .15s}
input:focus,textarea:focus{border-color:#E53935}
textarea{resize:vertical;min-height:80px}
label{font-size:12px;font-weight:600;color:#585870;letter-spacing:.4px;text-transform:uppercase;display:block;margin-bottom:6px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.badge-green{background:rgba(34,197,94,.15);color:#22C55E}
.badge-red{background:rgba(229,57,53,.15);color:#E53935}
.badge-dim{background:rgba(88,88,112,.15);color:#585870}
.badge-blue{background:rgba(37,99,235,.15);color:#2563EB}
.badge-amber{background:rgba(245,158,11,.15);color:#F59E0B}
.divider{height:1px;background:#1E1E28;margin:16px 0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(6px)}
.sheet{background:#111118;border-radius:24px 24px 0 0;padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:#2A2A38;border-radius:2px;margin:0 auto 20px}
.modal{background:#111118;border-radius:24px;padding:24px;margin:16px;max-height:92vh;overflow-y:auto}
.overlay-center{justify-content:center;align-items:center}
.avatar{border-radius:50%;object-fit:cover;background:#18181F;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-weight:400;color:#F0F0F4;flex-shrink:0;overflow:hidden}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:340px;margin:0 auto}
.numpad-key{height:80px;background:#18181F;border:1px solid #1E1E28;border-radius:18px;font-size:28px;font-weight:600;color:#F0F0F4;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;-webkit-user-select:none}
.numpad-key:active{background:#E53935;border-color:#E53935;transform:scale(.94)}
.pin-dots{display:flex;gap:16px;justify-content:center;margin:28px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #2A2A38;transition:all .2s}
.pin-dot.filled{background:#E53935;border-color:#E53935}
.custom-select-trigger{background:#18181F;border:1px solid #1E1E28;border-radius:12px;padding:14px 16px;font-size:14px;color:#F0F0F4;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border .15s;width:100%}
.custom-select-trigger:active{border-color:#E53935}
.custom-select-option{padding:16px;border-bottom:1px solid #1E1E28;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.custom-select-option:last-child{border-bottom:none}
.custom-select-option:active{background:#18181F}
.custom-select-option.selected{color:#E53935}
.cal-day{height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:all .12s;user-select:none;-webkit-user-select:none}
.cal-day:active{opacity:.7}
.cal-day.sel{background:#E53935;color:#fff}
.cal-day.tod{border:1px solid #E53935;color:#E53935}
.cal-day.tod.sel{color:#fff}
.streak-badge{background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.2);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;color:#E53935}
.progress-bar-bg{height:6px;background:#1E1E28;border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:#E53935;border-radius:3px;transition:width .4s}
.empty-state{padding:48px 24px;text-align:center;color:#585870}
.empty-state-title{font-size:16px;font-weight:600;margin-bottom:8px;color:#F0F0F4}
.stat-tile{background:#111118;border:1px solid #1E1E28;border-radius:14px;padding:14px 10px;text-align:center;flex:1}
.crop-canvas{display:block;touch-action:none;cursor:grab}
.crop-canvas:active{cursor:grabbing}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Sem vlož URL svého Apps Script nasazení ───────────
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxVSnLcp0kJTTMof_I5Vhe6eNgdmWiEHKI0bAddo2rYbdMwI80ik9dCcMNhtOt2Hgg/exec';
// ─────────────────────────────────────────────────────

const PIN='4321';
const MEMBERS=['Indy','Ričrd','Ondra','Pepa'];
const C={bg:'#0A0A0F',s1:'#111118',s2:'#18181F',border:'#1E1E28',text:'#F0F0F4',dim:'#585870',muted:'#30303E',merlot:'#E53935',green:'#22C55E',amber:'#F59E0B',blue:'#2563EB'};
const SCHEDULE=[
  {day:1,name:'Gym',time:'10:00',duration:90},
  {day:2,name:'Kalistenie + Běh',time:'10:00',duration:60},
  {day:4,name:'Gym + Běh',time:'10:00',duration:90},
  {day:5,name:'Gym + Běh',time:'10:00',duration:90},
  {day:6,name:'Plavání',time:'18:00',duration:60},
];
const MONTHS_CS=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const DAYS_CS=['Po','Út','St','Čt','Pá','So','Ne'];
const DAYS_FULL_CS=['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
const DEFAULT_DISCIPLINES=[
  {name:'Bench press',unit:'kg'},{name:'Dřep',unit:'kg'},{name:'Mrtvý tah',unit:'kg'},
  {name:'Kliky',unit:'opak.'},{name:'Shyby',unit:'opak.'},{name:'Běh',unit:'km'},{name:'Plavání',unit:'km'},
];

function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayDow(){return new Date().getDay();}
function getTodaySession(sched){return (sched||SCHEDULE).find(s=>s.day===todayDow())||null;}

// ── API – Apps Script ──────────────────────────────────
function mkId(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,9);}

async function apiGet(gc){
  const res=await fetch(`${SCRIPT_URL}?gc=${encodeURIComponent(gc)}`);
  return res.json();
}
// Fire-and-forget — UI nečeká, Sheets zapíše na pozadí
function apiPost(action,data){
  try{fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action,...data})});}catch(e){}
}

function upsertCI(gc,member,dateStr,status,note=''){
  apiPost('upsertCheckin',{group_code:gc,member,date:dateStr,status,note,ts:Date.now()});
}
function upsertPR(gc,member,exercise,value,unit){
  apiPost('upsertPR',{group_code:gc,member,exercise,value,unit,date:todayStr(),ts:Date.now()});
}
function upsertProfile(gc,member,fields){
  apiPost('upsertProfile',{group_code:gc,member,...fields,updated_at:Date.now()});
}
function insertChallengeApi(gc,data,id){
  apiPost('insertChallenge',{id,group_code:gc,...data,active:true,created_at:Date.now()});
}
function upsertProgress(challengeId,gc,member,value){
  apiPost('upsertProgress',{challenge_id:challengeId,group_code:gc,member,value,updated_at:Date.now()});
}
function upsertSettingApi(gc,key,value){
  apiPost('upsertSetting',{group_code:gc,key,value,updated_at:Date.now()});
}

// ── Scoring ────────────────────────────────────────────
// Rest days (dny mimo SCHEDULE) streak nemrzí — pouze explicitní 'missed' na tréninkový den jej resetuje
function isTrainingDay(dateStr){
  const dow=new Date(dateStr+'T12:00:00').getDay();
  return SCHEDULE.some(s=>s.day===dow);
}
function calcScore(cis,member){
  const sorted=[...cis.filter(c=>c.member===member&&c.status!=='none'&&c.status!=='planned')].sort((a,b)=>a.date>b.date?1:-1);
  let score=0,streak=0,maxStreak=0;
  sorted.forEach(c=>{
    if(c.status==='done'||c.status==='pr'){
      streak++;if(streak>maxStreak)maxStreak=streak;
      score+=10*(streak>=7?3:streak>=3?2:1)+(c.status==='pr'?5:0)+(c.note?2:0);
    }else if(c.status==='missed'&&isTrainingDay(c.date)){streak=0;score-=5;}
    // missed na rest day → ignorujeme, streak zůstává
  });
  return {score,streak,maxStreak};
}
function calcCurrentStreak(cis,member){
  const sorted=[...cis.filter(c=>c.member===member&&c.status!=='none'&&c.status!=='planned')].sort((a,b)=>a.date>b.date?-1:1);
  let s=0;
  for(const c of sorted){
    if(c.status==='done'||c.status==='pr') s++;
    else if(c.status==='missed'&&isTrainingDay(c.date)) break;
    // rest day missed → freeze, nepřerušovat
  }
  return s;
}

// ── Icons ──────────────────────────────────────────────

const IcoCamera=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;

const IcoTrophy=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>;
const IcoFlame=()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
const IcoTarget=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
const IcoClock=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const IcoCal=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
const IcoEdit=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;

// ── CustomSelect ───────────────────────────────────────
function CustomSelect({value,onChange,options,placeholder='Vyber...'}){
  const [open,setOpen]=useState(false);
  const sel=options.find(o=>o.value===value);
  return <>
    <div className="custom-select-trigger" onClick={()=>setOpen(true)}>
      <span style={{color:sel?C.text:C.dim}}>{sel?sel.label:placeholder}</span>
      <span style={{color:C.dim}}><IcoChevDown/></span>
    </div>
    {open&&<div className="overlay" onClick={()=>setOpen(false)}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        {options.map(o=><div key={o.value} className={`custom-select-option${value===o.value?' selected':''}`} onClick={()=>{onChange(o.value);setOpen(false);}}>
          <span>{o.label}</span>
          {value===o.value&&<span style={{color:C.merlot}}><IcoCheck/></span>}
        </div>)}
      </div>
    </div>}
  </>;
}

// ── CustomDatePicker ───────────────────────────────────
function CustomDatePicker({value,onChange,placeholder='Vyber datum...'}){
  const [open,setOpen]=useState(false);
  const now=new Date();
  const pv=value?{y:+value.split('-')[0],m:+value.split('-')[1]-1,d:+value.split('-')[2]}:null;
  const [viewY,setViewY]=useState(pv?pv.y:now.getFullYear());
  const [viewM,setViewM]=useState(pv?pv.m:now.getMonth());
  const dIM=new Date(viewY,viewM+1,0).getDate();
  const firstDow=new Date(viewY,viewM,1).getDay();
  const pad=firstDow===0?6:firstDow-1;
  const cells=[...Array(pad).fill(null),...Array.from({length:dIM},(_,i)=>i+1)];
  const selD=pv&&pv.y===viewY&&pv.m===viewM?pv.d:null;
  const todD=now.getFullYear()===viewY&&now.getMonth()===viewM?now.getDate():null;
  const prevM=()=>viewM===0?(setViewM(11),setViewY(y=>y-1)):setViewM(m=>m-1);
  const nextM=()=>viewM===11?(setViewM(0),setViewY(y=>y+1)):setViewM(m=>m+1);
  const pick=d=>{onChange(`${viewY}-${String(viewM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);setOpen(false);};
  const display=pv?`${pv.d}. ${MONTHS_CS[pv.m]} ${pv.y}`:null;
  return <>
    <div className="custom-select-trigger" onClick={()=>setOpen(true)}>
      <span style={{color:display?C.text:C.dim,display:'flex',alignItems:'center',gap:8}}><span style={{color:C.dim,display:'flex'}}><IcoCal/></span>{display||placeholder}</span>
      <span style={{color:C.dim}}><IcoChevDown/></span>
    </div>
    {open&&<div className="overlay" onClick={()=>setOpen(false)}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <button className="btn btn-secondary btn-sm" style={{width:44,minWidth:44,padding:0}} onClick={prevM}><IcoChevLeft/></button>
          <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:1}}>{MONTHS_CS[viewM]} {viewY}</div>
          <button className="btn btn-secondary btn-sm" style={{width:44,minWidth:44,padding:0}} onClick={nextM}><IcoChevRight/></button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:6}}>
          {DAYS_CS.map(d=><div key={d} style={{textAlign:'center',fontSize:11,color:C.dim,fontWeight:600,padding:'4px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:14}}>
          {cells.map((d,i)=><div key={i} className={`cal-day${d===selD?' sel':d===todD?' tod':''}`} style={{color:!d?'transparent':undefined}} onClick={d?()=>pick(d):undefined}>{d||''}</div>)}
        </div>
        {value&&<button className="btn btn-secondary" style={{width:'100%'}} onClick={()=>{onChange('');setOpen(false);}}>Zrušit datum</button>}
      </div>
    </div>}
  </>;
}

// ── CropEditor ─────────────────────────────────────────
function CropEditor({imageSrc,onCrop,onClose}){
  const SIZE=240;
  const canvasRef=useRef(null);
  const imgRef=useRef(null);
  const [offset,setOffset]=useState({x:0,y:0});
  const [scale,setScale]=useState(1);
  const [ready,setReady]=useState(false);
  const drag=useRef({active:false,sx:0,sy:0,ox:0,oy:0});
  const pinch=useRef({active:false,dist:0,startScale:1});

  useEffect(()=>{
    const img=new Image();
    img.onload=()=>{
      imgRef.current=img;
      const s=SIZE/Math.min(img.naturalWidth,img.naturalHeight);
      const initScale=Math.max(s,1);
      setScale(initScale);
      setOffset({x:(SIZE-img.naturalWidth*initScale)/2,y:(SIZE-img.naturalHeight*initScale)/2});
      setReady(true);
    };
    img.src=imageSrc;
  },[imageSrc]);

  useEffect(()=>{
    if(!ready||!canvasRef.current||!imgRef.current)return;
    const ctx=canvasRef.current.getContext('2d');
    ctx.clearRect(0,0,SIZE,SIZE);
    ctx.drawImage(imgRef.current,offset.x,offset.y,imgRef.current.naturalWidth*scale,imgRef.current.naturalHeight*scale);
  },[offset,scale,ready]);

  const getTD=e=>e.touches?.[0]?.clientX!==undefined?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
  const getPinchDist=e=>{const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);};

  const onStart=e=>{
    if(e.touches?.length===2){pinch.current={active:true,dist:getPinchDist(e),startScale:scale};return;}
    const {x,y}=getTD(e);drag.current={active:true,sx:x,sy:y,ox:offset.x,oy:offset.y};
  };
  const onMove=e=>{
    e.preventDefault();
    if(pinch.current.active&&e.touches?.length===2){
      const d=getPinchDist(e);
      setScale(Math.max(.3,Math.min(6,pinch.current.startScale*(d/pinch.current.dist))));return;
    }
    if(!drag.current.active)return;
    const {x,y}=getTD(e);
    setOffset({x:drag.current.ox+(x-drag.current.sx),y:drag.current.oy+(y-drag.current.sy)});
  };
  const onEnd=()=>{drag.current.active=false;pinch.current.active=false;};
  const zoom=d=>setScale(s=>Math.max(.3,Math.min(6,s+d)));

  const confirm=()=>{
    const out=document.createElement('canvas');out.width=120;out.height=120;
    const ctx=out.getContext('2d');
    ctx.beginPath();ctx.arc(60,60,60,0,Math.PI*2);ctx.clip();
    const r=120/SIZE;
    ctx.drawImage(imgRef.current,offset.x*r,offset.y*r,imgRef.current.naturalWidth*scale*r,imgRef.current.naturalHeight*scale*r);
    onCrop(out.toDataURL('image/jpeg',.9));
  };

  return <div className="overlay overlay-center" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:320,width:'100%'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:1,marginBottom:4}}>OŘÍZNI FOTKU</div>
      <div style={{fontSize:12,color:C.dim,marginBottom:16}}>Táhni pro přesunutí · štípni pro zoom</div>
      <div style={{display:'flex',justifyContent:'center',marginBottom:14}}>
        <div style={{width:SIZE,height:SIZE,borderRadius:'50%',overflow:'hidden',border:`3px solid ${C.merlot}`,flexShrink:0}}>
          <canvas ref={canvasRef} width={SIZE} height={SIZE} className="crop-canvas"
            onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
            onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
          />
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:20}}>
        <button className="btn btn-secondary btn-sm" style={{width:48,minWidth:48,padding:0,fontSize:22,fontWeight:300}} onClick={()=>zoom(-.15)}>−</button>
        <span style={{fontSize:12,color:C.dim}}>přiblížení</span>
        <button className="btn btn-secondary btn-sm" style={{width:48,minWidth:48,padding:0,fontSize:22,fontWeight:300}} onClick={()=>zoom(.15)}>+</button>
      </div>
      <div className="btn-row btn-row-2">
        <button className="btn btn-secondary" onClick={onClose}>Zrušit</button>
        <button className="btn btn-primary" onClick={confirm} disabled={!ready}>Uložit fotku</button>
      </div>
    </div>
  </div>;
}

// ── PIN Screen ─────────────────────────────────────────
function PinScreen({onAuth}){
  const [pin,setPin]=useState('');
  const [shake,setShake]=useState(false);
  const append=d=>{
    if(pin.length>=4)return;
    const next=pin+d;
    if(next.length===4){if(next===PIN)onAuth();else{setShake(true);setTimeout(()=>{setPin('');setShake(false);},600);}}
    else setPin(next);
  };
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 20px',background:C.bg}}>
    <div style={{fontFamily:'Bebas Neue',fontSize:34,letterSpacing:3,marginBottom:4}}>SQUAD GYM</div>
    <div style={{fontSize:13,color:C.dim,marginBottom:4}}>zadej PIN</div>
    <div className="pin-dots" style={shake?{animation:'shake .4s'}:{}}>
      {[0,1,2,3].map(i=><div key={i} className={`pin-dot${pin.length>i?' filled':''}`}/>)}
    </div>
    <div className="numpad" style={{marginTop:4}}>
      {[1,2,3,4,5,6,7,8,9].map(n=><div key={n} className="numpad-key" onClick={()=>append(String(n))}>{n}</div>)}
      <div/>
      <div className="numpad-key" onClick={()=>append('0')}>0</div>
      <div className="numpad-key" onClick={()=>setPin(p=>p.slice(0,-1))}><IcoDel/></div>
    </div>
    <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-10px)}40%,80%{transform:translateX(10px)}}`}</style>
  </div>;
}

              <div style={{fontSize:11,color:C.dim,textTransform:'uppercase',letterSpacing:.4,marginBottom:1}}>Rekord</div>

            <div style={{fontFamily:'Bebas Neue',fontSize:30,color:C.merlot,lineHeight:1}}>{r.record.value}<span style={{fontSize:14,color:C.dim,marginLeft:4}}>{r.unit}</span></div>
          </div>
          :<div style={{fontSize:13,color:C.dim,textAlign:'center',padding:'10px 0',marginBottom:6}}>Zatím bez rekordu — zaloguj PR</div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          {r.memberVals.map(({m,pr})=><div key={m} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <Av member={m} size={28} avatar={getAv(m)}/>
            <div style={{fontSize:10,color:C.dim}}>{m}</div>

// ── Schedule Editor ────────────────────────────────────
function ScheduleEditor({schedule,doSetting}){
  const ORDER=[1,2,3,4,5,6,0];
  const [days,setDays]=useState(()=>ORDER.map(n=>{
    const ex=schedule.find(s=>s.day===n);
    return ex?{day:n,on:true,name:ex.name,time:ex.time,dur:ex.duration||60}:{day:n,on:false,name:'',time:'10:00',dur:60};
  }));
  const [saved,setSaved]=useState(false);
  const toggle=i=>setDays(d=>d.map((x,j)=>j===i?{...x,on:!x.on}:x));
  const upd=(i,f,v)=>setDays(d=>d.map((x,j)=>j===i?{...x,[f]:v}:x));
  const save=()=>{
    const s=days.filter(d=>d.on&&d.name.trim()).map(d=>({day:d.day,name:d.name.trim(),time:d.time,duration:d.dur}));
    doSetting('schedule',JSON.stringify(s));
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  return <div style={{paddingBottom:24}}>
    <div style={{fontSize:12,color:C.dim,textTransform:'uppercase',letterSpacing:.4,marginBottom:12}}>Týdenní plán tréninků</div>
    <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
      {days.map((d,i)=><div key={d.day} className="card" style={{padding:'14px 16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1,fontWeight:600,fontSize:14,color:d.on?C.text:C.dim}}>{DAYS_FULL_CS[d.day]}</div>
          {d.on&&<span style={{fontSize:12,color:C.dim,marginRight:4}}>{d.time}{d.dur?` · ${d.dur} min`:''}</span>}
          <Toggle on={d.on} onToggle={()=>toggle(i)}/>
        </div>
        {d.on&&<div style={{marginTop:12,display:'flex',flexDirection:'column',gap:10}}>
          <div><label>Název tréninku</label><input placeholder="např. Gym, Kalistenie + Běh..." value={d.name} onChange={e=>upd(i,'name',e.target.value)}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label>Čas (HH:MM)</label><input placeholder="10:00" value={d.time} onChange={e=>upd(i,'time',e.target.value)}/></div>
            <div><label>Délka (min)</label><input type="number" placeholder="60" value={d.dur} onChange={e=>upd(i,'dur',+e.target.value||0)}/></div>
          </div>
        </div>}
      </div>)}
    </div>
    <button className="btn btn-primary" style={{width:'100%'}} onClick={save}>
      {saved?<><IcoCheck/> Uloženo</>:'Uložit plán'}
    </button>
  </div>;
}

// ── Squad View ─────────────────────────────────────────
function SquadView({gc,member,checkins,profiles,prs,settings,doSetting}){
  const [sub,setSub]=useState('clenove');
  const [sel,setSel]=useState(null);

  const schedJson=settings.find(s=>s.key==='schedule')?.value;
  const schedule=schedJson?JSON.parse(schedJson):SCHEDULE;
  const discJson=settings.find(s=>s.key==='disciplines')?.value;
  const disciplines=discJson?JSON.parse(discJson):DEFAULT_DISCIPLINES;

  const scores=MEMBERS.map(m=>{
    const {score,streak,maxStreak}=calcScore(checkins,m);
    const total=checkins.filter(c=>c.member===m&&(c.status==='done'||c.status==='pr')).length;
    const missed=checkins.filter(c=>c.member===m&&c.status==='missed').length;
    const prof=profiles.find(p=>p.member===m);
    const stats=prof?.stats_json?JSON.parse(prof.stats_json):{};
    return {m,score,streak,maxStreak,total,missed,av:prof?.avatar_data,stats};
  });
  const detail=sel?scores.find(s=>s.m===sel):null;
  const detailHistory=sel?checkins.filter(c=>c.member===sel&&c.status!=='planned').sort((a,b)=>a.date>b.date?-1:1).slice(0,20):[];

  const subTabs=[['clenove','Členové'],['rekordy','Rekordy'],['plan','Plán']];

  return <div className="screen" style={{padding:'0 16px'}}>
    <div style={{padding:'20px 0 12px'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:1.5}}>PARTA</div>
    </div>

    {/* Sub-nav */}
    <div style={{display:'flex',gap:4,marginBottom:16,background:C.s2,borderRadius:14,padding:4}}>
      {subTabs.map(([id,lbl])=><button key={id} onClick={()=>{setSub(id);setSel(null);}} style={{flex:1,height:36,border:'none',borderRadius:10,cursor:'pointer',fontFamily:'Inter',fontWeight:700,fontSize:11,letterSpacing:.5,textTransform:'uppercase',background:sub===id?C.s1:'transparent',color:sub===id?C.text:C.dim,transition:'all .15s'}}>{lbl}</button>)}
    </div>

    {/* Členové */}
    {sub==='clenove'&&<div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
      {scores.map(s=><div key={s.m} className="card" style={{cursor:'pointer'}} onClick={()=>setSel(sel===s.m?null:s.m)}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <Av member={s.m} size={48} avatar={s.av} showStatus checkins={checkins}/>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <span style={{fontWeight:700,fontSize:15}}>{s.m}</span>
              {s.streak>=3&&<span className="streak-badge" style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:11}}><IcoFlame/>{s.streak}x</span>}
            </div>
            <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
              <span style={{fontSize:12,color:C.dim}}>{s.total} tréninků</span>
              {s.missed>0&&<span style={{fontSize:12,color:C.merlot}}>{s.missed}x nesplnil</span>}
              {s.stats.weight&&<span style={{fontSize:12,color:C.dim}}>{s.stats.weight} kg</span>}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:24,color:C.merlot}}>{s.score}</div>
            <div style={{fontSize:11,color:C.dim}}>bodů</div>
          </div>
        </div>
        {sel===s.m&&detail&&<>
          <div className="divider"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
            {[{l:'Max streak',v:`${detail.maxStreak}x`},{l:'Streak',v:`${detail.streak}x`},{l:'Průměrný',v:detail.total>0?(detail.score/detail.total).toFixed(1):'0'}].map(({l,v})=><div key={l} style={{background:C.s2,borderRadius:10,padding:10,textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:20}}>{v}</div>
              <div style={{fontSize:10,color:C.dim,textTransform:'uppercase'}}>{l}</div>
            </div>)}
          </div>
          {(detail.stats.age||detail.stats.weight||detail.stats.height)&&<div style={{display:'flex',gap:8,marginBottom:12}}>
            {detail.stats.age&&<span style={{fontSize:12,color:C.dim,background:C.s2,borderRadius:8,padding:'4px 10px'}}>{detail.stats.age} let</span>}
            {detail.stats.weight&&<span style={{fontSize:12,color:C.dim,background:C.s2,borderRadius:8,padding:'4px 10px'}}>{detail.stats.weight} kg</span>}
            {detail.stats.height&&<span style={{fontSize:12,color:C.dim,background:C.s2,borderRadius:8,padding:'4px 10px'}}>{detail.stats.height} cm</span>}
          </div>}
          <div style={{maxHeight:200,overflowY:'auto'}}>
            {detailHistory.map(c=><div key={c.date} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
              <div style={{width:32,textAlign:'center'}}>
                {(c.status==='done'||c.status==='pr')&&<span style={{color:C.green}}><IcoCheck/></span>}
                {c.status==='missed'&&<span style={{color:C.merlot}}><IcoX/></span>}
                {c.status==='excused'&&<span style={{fontSize:11,color:C.dim}}>omluven</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500}}>{c.date}</div>
                {c.note&&<div style={{fontSize:11,color:C.dim}}>{c.note}</div>}
              </div>
            </div>)}
          </div>
        </>}
      </div>)}
    </div>}

    {/* Rekordy */}
    {sub==='rekordy'&&<RecordsSection prs={prs} profiles={profiles} disciplines={disciplines} doSetting={doSetting}/>}

    {/* Plán */}
    {sub==='plan'&&<ScheduleEditor schedule={schedule} doSetting={doSetting}/>}
  </div>;
}

// ── Main App ───────────────────────────────────────────
const POLL_MS=15000; // refresh každých 15 s

function MainApp({gc,member}){
  const [tab,setTab]=useState('dnes');
  const [checkins,setCheckins]=useState([]);
  const [prs,setPrs]=useState([]);
  const [profiles,setProfiles]=useState([]);
  const [challenges,setChallenges]=useState([]);
  const [progress,setProgress]=useState([]);
  const [settings,setSettings]=useState([]);
  const [syncing,setSyncing]=useState(false);

  // Optimistické akce — okamžitě updatují state, zápis jde na pozadí
  const doCI=useCallback((member,date,status,note='')=>{
    setCheckins(p=>[...p.filter(c=>!(c.member===member&&c.date===date)),{group_code:gc,member,date,status,note,ts:Date.now()}]);
    upsertCI(gc,member,date,status,note);
  },[gc]);

  const doPR=useCallback((member,exercise,value,unit)=>{
    setPrs(p=>[...p.filter(r=>!(r.member===member&&r.exercise===exercise)),{group_code:gc,member,exercise,value,unit,date:todayStr(),ts:Date.now()}]);
    upsertPR(gc,member,exercise,value,unit);
  },[gc]);

  const doProfile=useCallback((member,fields)=>{
    setProfiles(p=>{
      const ex=p.find(r=>r.member===member)||{};
      return [...p.filter(r=>r.member!==member),{...ex,group_code:gc,member,...fields,updated_at:Date.now()}];
    });
    upsertProfile(gc,member,fields);
  },[gc]);

  const doChallenge=useCallback((data)=>{
    const id=mkId();
    setChallenges(p=>[{id,group_code:gc,...data,active:true,created_at:Date.now()},...p]);
    insertChallengeApi(gc,data,id);
    return id;
  },[gc]);

  const doProgress=useCallback((challengeId,member,value)=>{
    setProgress(p=>[...p.filter(r=>!(r.challenge_id===challengeId&&r.member===member)),{challenge_id:challengeId,group_code:gc,member,value,updated_at:Date.now()}]);
    upsertProgress(challengeId,gc,member,value);
  },[gc]);

  const doSetting=useCallback((key,value)=>{
    setSettings(p=>[...p.filter(s=>!(s.group_code===gc&&s.key===key)),{group_code:gc,key,value,updated_at:Date.now()}]);
    upsertSettingApi(gc,key,value);
  },[gc]);

  const refreshAll=useCallback(async(silent=false)=>{
    if(!silent)setSyncing(true);
    try{const d=await apiGet(gc);setCheckins(d.checkins||[]);setPrs(d.prs||[]);setProfiles(d.profiles||[]);setChallenges((d.challenges||[]).sort((a,b)=>(b.created_at||0)-(a.created_at||0)));setProgress(d.progress||[]);setSettings(d.settings||[]);}catch(e){console.warn('Sync',e);}
    if(!silent)setSyncing(false);
  },[gc]);

  useEffect(()=>{
    refreshAll();
    // Polling – aktivní jen když je tab viditelný
    let timer=null;
    const startPoll=()=>{ timer=setInterval(()=>{ if(!document.hidden)refreshAll(true); },POLL_MS); };
    const stopPoll=()=>clearInterval(timer);
    startPoll();
    document.addEventListener('visibilitychange',()=>{ if(document.hidden)stopPoll();else{refreshAll(true);startPoll();} });
    return()=>stopPoll();
  },[gc]);

  const navItems=[
    {id:'dnes',label:'Dnes',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
    {id:'skore',label:'Skóre',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
    {id:'vyzvy',label:'Výzvy',icon:<IcoTarget/>},
    {id:'ja',label:'Já',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},
    {id:'parta',label:'Parta',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>},
  ];

  return <div style={{height:'100vh',display:'flex',flexDirection:'column',background:C.bg}}>
    {syncing&&<div style={{position:'fixed',top:0,left:0,right:0,height:2,background:C.merlot,zIndex:999,animation:'syncbar 1s linear infinite'}}/>}
    {tab==='dnes'&&<TodayView gc={gc} member={member} checkins={checkins} profiles={profiles} doCI={doCI} settings={settings}/>}
    {tab==='skore'&&<ScoreView gc={gc} member={member} checkins={checkins} profiles={profiles}/>}
    {tab==='vyzvy'&&<ChallengesView gc={gc} member={member} challenges={challenges} progress={progress} profiles={profiles} doChallenge={doChallenge} doProgress={doProgress}/>}
    {tab==='ja'&&<MeView gc={gc} member={member} checkins={checkins} prs={prs} profiles={profiles} doPR={doPR} doProfile={doProfile}/>}
    {tab==='parta'&&<SquadView gc={gc} member={member} checkins={checkins} profiles={profiles} prs={prs} settings={settings} doSetting={doSetting}/>}
    <nav className="nav">
      {navItems.map(n=><div key={n.id} className={`nav-btn${tab===n.id?' on':''}`} onClick={()=>setTab(n.id)}>
        <span className="nav-ico">{n.icon}</span>
        <span className="nav-lbl">{n.label}</span>
      </div>)}
    </nav>
    <style>{`@keyframes syncbar{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}`}</style>
  </div>;
}

// ── Root ───────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(()=>localStorage.getItem('sg_authed')==='1');
  const [member,setMember]=useState(()=>localStorage.getItem('sg_member')||null);
  const GC='sg_default';
  if(!authed)return <PinScreen onAuth={()=>{localStorage.setItem('sg_authed','1');setAuthed(true);}}/>;
  if(!member)return <MemberSelect onSelect={m=>{localStorage.setItem('sg_member',m);setMember(m);}} profiles={[]}/>;
  return <MainApp gc={GC} member={member}/>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
