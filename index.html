#root{display:flex;flex-direction:column}

.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;-webkit-overflow-scrolling:touch}

.nav{

.nav-btn:active{opacity:.5}
.nav-lbl{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#3A3A52;transition:color .15s}

.card{background:#111118;border:1px solid #1E1E28;border-radius:16px;padding:16px}

function calcScore(cis,member){
  const sorted=[...cis.filter(c=>c.member===member&&c.status!=='none')].sort((a,b)=>a.date>b.date?1:-1);
  let score=0,streak=0,maxStreak=0;
  sorted.forEach(c=>{
    if(c.status==='done'){
      streak++;
      if(streak>maxStreak)maxStreak=streak;
      const mult=streak>=7?3:streak>=3?2:1;
      score+=10*mult;
      if(c.note)score+=2;
    } else if(c.status==='pr'){
      streak++;
      if(streak>maxStreak)maxStreak=streak;
      const mult=streak>=7?3:streak>=3?2:1;
      score+=10*mult+5;
      if(c.note)score+=2;
    } else if(c.status==='missed'){
      streak=0;
      score-=5;
    } else if(c.status==='excused'){
      // no change
    }
  });
  return {score,streak,maxStreak};
}

function calcCurrentStreak(cis,member){
  const sorted=[...cis.filter(c=>c.member===member&&c.status!=='none')].sort((a,b)=>a.date>b.date?-1:1);
  let streak=0;
  for(const c of sorted){
    if(c.status==='done'||c.status==='pr'){streak++;}
    else if(c.status==='missed'){break;}
  }
  return streak;
}

async function resizeImage(file,size=120){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        canvas.width=size;canvas.height=size;
        const ctx=canvas.getContext('2d');
        const s=Math.min(img.width,img.height);
        const ox=(img.width-s)/2,oy=(img.height-s)/2;
        ctx.drawImage(img,ox,oy,s,s,0,0,size,size);
        resolve(canvas.toDataURL('image/jpeg',0.8));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// --- PIN Screen ---
function PinScreen({onAuth}){
  const [pin,setPin]=useState('');
  const [shake,setShake]=useState(false);
  const append=d=>{
    if(pin.length>=4)return;
    const next=pin+d;
    if(next.length===4){
      if(next===PIN){onAuth();}
      else{setShake(true);setTimeout(()=>{setPin('');setShake(false);},600);}
    } else setPin(next);
  };
  const del=()=>setPin(p=>p.slice(0,-1));
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',background:C.bg}}>
    <div style={{fontFamily:'Bebas Neue',fontSize:32,letterSpacing:3,color:C.text,marginBottom:4}}>SQUAD GYM</div>
    <div style={{fontSize:13,color:C.dim,marginBottom:32}}>zadej PIN</div>
    <div className={`pin-dots${shake?' shake':''}`} style={shake?{animation:'shake .4s'}:{}}>
      {[0,1,2,3].map(i=><div key={i} className={`pin-dot${pin.length>i?' filled':''}`}/>)}
    </div>
    <div className="numpad" style={{marginTop:8}}>
      {[1,2,3,4,5,6,7,8,9].map(n=><div key={n} className="numpad-key" onClick={()=>append(String(n))}>{n}</div>)}
      <div/>
      <div className="numpad-key" onClick={()=>append('0')}>0</div>

    </div>
    <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
  </div>;
}

// --- Score View ---
function ScoreView({gc,member,checkins,profiles}){
  const scores=MEMBERS.map(m=>{
    const {score,streak,maxStreak}=calcScore(checkins,m);
    const total=checkins.filter(c=>c.member===m&&(c.status==='done'||c.status==='pr')).length;
    const av=profiles.find(p=>p.member===m)?.avatar_data;
    return {m,score,streak,maxStreak,total,av};
  }).sort((a,b)=>b.score-a.score);
  const maxScore=scores[0]?.score||1;

  const myHistory=checkins.filter(c=>c.member===member).sort((a,b)=>a.date>b.date?-1:1).slice(0,14);

  return <div className="screen" style={{padding:'0 16px'}}>
    <div style={{padding:'20px 0 8px'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:1.5,color:C.text}}>SKORE</div>
      <div style={{fontSize:13,color:C.dim}}>Kdo makam nejvic</div>
    </div>

    <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
      {scores.map((s,i)=><div key={s.m} className="card" style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{fontFamily:'Bebas Neue',fontSize:20,color:i===0?C.merlot:C.dim,width:24,textAlign:'center'}}>{i+1}</div>
        <Av member={s.m} size={44} avatar={s.av} showStatus checkins={checkins}/>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <span style={{fontWeight:700,fontSize:15}}>{s.m}</span>
            {s.streak>=3&&<span className="streak-badge" style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:11}}><IcoFlame/>{s.streak}x</span>}
          </div>
          <div className="progress-bar-bg">
            <div className="progress-bar-fill" style={{width:`${(s.score/maxScore)*100}%`}}/>
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:22,color:i===0?C.merlot:C.text}}>{s.score}</div>
          <div style={{fontSize:11,color:C.dim}}>{s.total} treninku</div>
        </div>
      </div>)}
    </div>

    <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:1,color:C.text,marginBottom:10}}>TVOJE POSLEDNI TRENINKY</div>
    {myHistory.length===0&&<div className="empty-state"><div className="empty-state-title">Zatim zadne zaznamy</div><div>Zacni trenigy logovat dnes</div></div>}
    <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:24}}>
      {myHistory.map(c=><div key={c.date+c.member} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
        <div style={{width:40,textAlign:'center'}}>
          {(c.status==='done'||c.status==='pr')&&<span style={{color:C.green}}><IcoCheck/></span>}
          {c.status==='missed'&&<span style={{color:C.merlot}}><IcoX/></span>}
          {c.status==='excused'&&<span style={{fontSize:12,color:C.dim}}>ok</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600}}>{c.date}</div>
          {c.note&&<div style={{fontSize:12,color:C.dim,marginTop:2}}>{c.note}</div>}
        </div>
        {c.status==='pr'&&<span className="badge badge-red" style={{fontSize:10}}>PR</span>}
      </div>)}
    </div>
  </div>;
}

// --- Challenges View ---
function ChallengesView({gc,member,challenges,progress,profiles,refreshChallenges}){
  const [createModal,setCreateModal]=useState(false);
  const [updateModal,setUpdateModal]=useState(null);

  const getProgress=(cid,m)=>progress.find(p=>p.challenge_id===cid&&p.member===m);

  return <div className="screen" style={{padding:'0 16px'}}>
    <div style={{padding:'20px 0 8px',display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
      <div>
        <div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:1.5,color:C.text}}>VYZVY</div>
        <div style={{fontSize:13,color:C.dim}}>Kdo to zvladne?</div>
      </div>
      <button className="btn btn-primary btn-sm" onClick={()=>setCreateModal(true)}>
        <IcoPlus/> Nova
      </button>
    </div>

    {challenges.length===0&&<div className="empty-state">
      <div className="empty-state-title">Zatim zadne vyzvy</div>
      <div>Pridej prvni vyzvu pro partu</div>
    </div>}

    <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
      {challenges.map(ch=>{
        const myP=getProgress(ch.id,member);
        const allP=MEMBERS.map(m=>({m,p:getProgress(ch.id,m)}));
        const maxVal=ch.target_value||Math.max(...allP.map(x=>x.p?.value||0),1);
        return <div key={ch.id} className="card">
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{ch.title}</div>
              {ch.description&&<div style={{fontSize:12,color:C.dim,marginBottom:4}}>{ch.description}</div>}
              <div style={{display:'flex',gap:6}}>
                <span className={`badge ${ch.type==='yesno'?'badge-blue':'badge-dim'}`}>{ch.type==='yesno'?'Ano/Ne':'Vlastni'}</span>
                {ch.end_date&&<span className="badge badge-dim">{ch.end_date}</span>}
              </div>
            </div>
          </div>

          {ch.type==='yesno'
            ?<div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {allP.map(({m,p})=>{
                const av=profiles.find(pr=>pr.member===m)?.avatar_data;
                const done=p?.value>=1;
                return <div key={m} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <div style={{position:'relative'}}>
                    <Av member={m} size={36} avatar={av}/>
                    {done&&<div style={{position:'absolute',bottom:-2,right:-2,width:14,height:14,background:C.green,borderRadius:'50%',border:`2px solid ${C.s1}`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:8}}><IcoCheck/></div>}
                  </div>
                  <div style={{fontSize:10,color:done?C.green:C.dim}}>{m}</div>
                </div>;
              })}
            </div>
            :<div style={{display:'flex',flexDirection:'column',gap:8}}>
              {allP.map(({m,p})=>{
                const val=p?.value||0;
                const pct=Math.min((val/maxVal)*100,100);
                const av=profiles.find(pr=>pr.member===m)?.avatar_data;
                return <div key={m} style={{display:'flex',alignItems:'center',gap:10}}>
                  <Av member={m} size={28} avatar={av}/>
                  <div style={{flex:1}}>
                    <div className="progress-bar-bg">
                      <div className="progress-bar-fill" style={{width:`${pct}%`}}/>
                    </div>
                  </div>
                  <div style={{fontSize:13,fontWeight:600,width:40,textAlign:'right',color:C.merlot}}>{val}</div>
                </div>;
              })}
            </div>
          }

          <button className="btn btn-secondary btn-sm" style={{marginTop:12,width:'100%'}} onClick={()=>setUpdateModal(ch)}>
            Aktualizovat muj vysledek
          </button>
        </div>;
      })}
    </div>

    {createModal&&<CreateChallengeModal gc={gc} member={member} onClose={()=>setCreateModal(false)} onCreated={refreshChallenges}/>}
    {updateModal&&<UpdateProgressModal gc={gc} member={member} challenge={updateModal} progress={progress.find(p=>p.challenge_id===updateModal.id&&p.member===member)} onClose={()=>setUpdateModal(null)} onUpdated={refreshChallenges}/>}
  </div>;
}

function CreateChallengeModal({gc,member,onClose,onCreated}){
  const [title,setTitle]=useState('');
  const [desc,setDesc]=useState('');
  const [type,setType]=useState('custom');
  const [target,setTarget]=useState('');
  const [endDate,setEndDate]=useState('');
  const [loading,setLoading]=useState(false);
  const typeOptions=[{value:'custom',label:'Vlastni (cisla)'},{value:'yesno',label:'Ano / Ne (splnil / nesplnil)'}];
  const create=async()=>{
    if(!title.trim())return;
    setLoading(true);
    await insertChallenge(gc,{title:title.trim(),description:desc.trim(),type,target_value:target?parseFloat(target):null,end_date:endDate||null,created_by:member});
    await onCreated();
    setLoading(false);
    onClose();
  };
  return <div className="overlay overlay-center" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:400}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:24,letterSpacing:1,marginBottom:4}}>NOVA VYZVA</div>
      <div style={{fontSize:13,color:C.dim,marginBottom:20}}>Vytvor vyzvu pro partu</div>
      <div style={{marginBottom:14}}>
        <label>Nazev vyzvy</label>
        <input placeholder="napr. Kdo udela 100 drepov prvni" value={title} onChange={e=>setTitle(e.target.value)}/>
      </div>
      <div style={{marginBottom:14}}>
        <label>Popis (volitelne)</label>
        <textarea placeholder="Podrobnosti vyzvy..." value={desc} onChange={e=>setDesc(e.target.value)} style={{minHeight:60}}/>
      </div>
      <div style={{marginBottom:14}}>
        <label>Typ vyzvy</label>
        <CustomSelect value={type} onChange={setType} options={typeOptions}/>
      </div>
      {type==='custom'&&<div style={{marginBottom:14}}>
        <label>Cilova hodnota (volitelne)</label>
        <input type="number" placeholder="napr. 100" value={target} onChange={e=>setTarget(e.target.value)}/>
      </div>}
      <div style={{marginBottom:20}}>
        <label>Konec vyzvy (volitelne)</label>
        <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}/>
      </div>
      <div className="btn-row btn-row-2">
        <button className="btn btn-secondary" onClick={onClose}>Zrusit</button>
        <button className="btn btn-primary" disabled={loading||!title.trim()} onClick={create}>Vytvorit</button>

function UpdateProgressModal({gc,member,challenge,progress,onClose,onUpdated}){
  const [val,setVal]=useState(progress?.value||0);
  const [loading,setLoading]=useState(false);
  const save=async()=>{
    setLoading(true);
    await upsertProgress(challenge.id,gc,member,challenge.type==='yesno'?1:parseFloat(val)||0);
    await onUpdated();
    setLoading(false);
    onClose();
  };
  return <div className="overlay overlay-center" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:360}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:1,marginBottom:4}}>{challenge.title}</div>
      <div style={{fontSize:13,color:C.dim,marginBottom:20}}>Tvuj aktualni vysledek</div>
      {challenge.type==='yesno'
        ?<div style={{marginBottom:20}}>
          <button className="btn btn-primary" style={{width:'100%'}} onClick={async()=>{
            setLoading(true);
            await upsertProgress(challenge.id,gc,member,1);
            await onUpdated();
            setLoading(false);
            onClose();
          }} disabled={loading}>Splneno!</button>
        </div>
        :<div style={{marginBottom:20}}>
          <label>Aktualni hodnota</label>
          <input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="0"/>

      }
      <div className="btn-row btn-row-2">
        <button className="btn btn-secondary" onClick={onClose}>Zrusit</button>
        {challenge.type!=='yesno'&&<button className="btn btn-primary" disabled={loading} onClick={save}>Ulozit</button>}

    </div>
  </div>;
}

      ].map(({label,val,color})=><div key={label} className="card" style={{textAlign:'center',padding:'14px 8px'}}>
        <div style={{fontFamily:'Bebas Neue',fontSize:28,color}}>{val}</div>
        <div style={{fontSize:11,color:C.dim,textTransform:'uppercase',letterSpacing:.4}}>{label}</div>
      </div>)}
    </div>

    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:1,color:C.text}}>OSOBAKY (PRs)</div>
      <button className="btn btn-secondary btn-sm" onClick={()=>setPrModal(true)}><IcoPlus/> Pridat</button>
    </div>

    {myPRs.length===0&&<div style={{color:C.dim,fontSize:13,textAlign:'center',padding:'24px 0',marginBottom:16}}>Zatim zadne osobaky. Zacni makat!</div>}
    <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:24}}>
      {myPRs.map(pr=><div key={pr.exercise} className="card" style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px'}}>
        <div style={{color:C.merlot}}><IcoTrophy/></div>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:14}}>{pr.exercise}</div>
          <div style={{fontSize:12,color:C.dim}}>{pr.date}</div>
        </div>
        <div style={{fontFamily:'Bebas Neue',fontSize:22,color:C.merlot}}>{pr.value} <span style={{fontSize:14,color:C.dim}}>{pr.unit}</span></div>
      </div>)}
    </div>

    {prModal&&<div className="overlay overlay-center" onClick={()=>setPrModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:360}}>
        <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:1,marginBottom:4}}>NOVY OSOBAK</div>
        <div style={{fontSize:13,color:C.dim,marginBottom:20}}>Zaznamenej svuj novy personal record</div>
        <div style={{marginBottom:14}}>
          <label>Cviceni</label>
          <CustomSelect value={exercise} onChange={setExercise} options={exOptions} placeholder="Vyber cviceni..."/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
          <div>
            <label>Hodnota</label>
            <input type="number" placeholder="0" value={prVal} onChange={e=>setPrVal(e.target.value)}/>
          </div>
          <div>
            <label>Jednotka</label>
            <CustomSelect value={prUnit} onChange={setPrUnit} options={unitOptions}/>
          </div>
        </div>
        <div className="btn-row btn-row-2">
          <button className="btn btn-secondary" onClick={()=>setPrModal(false)}>Zrusit</button>
          <button className="btn btn-primary" disabled={!exercise||!prVal} onClick={async()=>{
            await upsertPR(gc,member,exercise,parseFloat(prVal),prUnit);
            setPrModal(false);
          }}>Ulozit</button>
        </div>
      </div>
    </div>}
  </div>;
}

// --- Squad View ---
function SquadView({gc,checkins,profiles}){
  const [sel,setSel]=useState(null);
  const getAv=m=>profiles.find(p=>p.member===m)?.avatar_data;

  const scores=MEMBERS.map(m=>{
    const {score,streak,maxStreak}=calcScore(checkins,m);
    const total=checkins.filter(c=>c.member===m&&(c.status==='done'||c.status==='pr')).length;
    const missed=checkins.filter(c=>c.member===m&&c.status==='missed').length;
    return {m,score,streak,maxStreak,total,missed,av:getAv(m)};
  });

  const detail=sel?scores.find(s=>s.m===sel):null;
  const detailHistory=sel?checkins.filter(c=>c.member===sel).sort((a,b)=>a.date>b.date?-1:1).slice(0,20):[];

  return <div className="screen" style={{padding:'0 16px'}}>
    <div style={{padding:'20px 0 8px'}}>
      <div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:1.5,color:C.text}}>PARTA</div>
      <div style={{fontSize:13,color:C.dim}}>Vsichni clenove</div>
    </div>

    <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
      {scores.map(s=><div key={s.m} className="card" style={{cursor:'pointer'}} onClick={()=>setSel(sel===s.m?null:s.m)}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <Av member={s.m} size={48} avatar={s.av} showStatus checkins={checkins}/>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <span style={{fontWeight:700,fontSize:15}}>{s.m}</span>
              {s.streak>=3&&<span className="streak-badge" style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:11}}><IcoFlame/>{s.streak}x</span>}
            </div>
            <div style={{display:'flex',gap:12}}>
              <span style={{fontSize:12,color:C.dim}}>{s.total} treninku</span>
              {s.missed>0&&<span style={{fontSize:12,color:C.merlot}}>{s.missed}x zmekal</span>}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:24,color:C.merlot}}>{s.score}</div>
            <div style={{fontSize:11,color:C.dim}}>bodu</div>
          </div>
        </div>

        {sel===s.m&&detail&&<>
          <div className="divider"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
            {[
              {l:'Max seria',v:`${detail.maxStreak}x`},
              {l:'Aktualni',v:`${detail.streak}x`},
              {l:'Prumerny',v:detail.total>0?(detail.score/detail.total).toFixed(1):'0'},
            ].map(({l,v})=><div key={l} style={{background:C.s2,borderRadius:10,padding:'10px',textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:20,color:C.text}}>{v}</div>
              <div style={{fontSize:10,color:C.dim,textTransform:'uppercase'}}>{l}</div>
            </div>)}
          </div>
          <div style={{maxHeight:200,overflowY:'auto'}}>
            {detailHistory.map(c=><div key={c.date} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
              <div style={{width:32,textAlign:'center'}}>
                {(c.status==='done'||c.status==='pr')&&<span style={{color:C.green}}><IcoCheck/></span>}
                {c.status==='missed'&&<span style={{color:C.merlot}}><IcoX/></span>}
                {c.status==='excused'&&<span style={{fontSize:11,color:C.dim}}>ok</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500}}>{c.date}</div>
                {c.note&&<div style={{fontSize:11,color:C.dim}}>{c.note}</div>}
              </div>
            </div>)}
          </div>
        </>}
      </div>)}
    </div>
  </div>;
}

// --- Main App ---
function MainApp({gc,member,onLogout}){
  const [tab,setTab]=useState('dnes');
  const [checkins,setCheckins]=useState([]);
  const [prs,setPrs]=useState([]);
  const [profiles,setProfiles]=useState([]);
  const [challenges,setChallenges]=useState([]);
  const [progress,setProgress]=useState([]);

  const refreshCI=useCallback(async()=>{
    const d=await loadCI(gc);setCheckins(d);
  },[gc]);
  const refreshPRs=useCallback(async()=>{
    const d=await loadPRs(gc);setPrs(d);
  },[gc]);
  const refreshProfiles=useCallback(async()=>{
    const d=await loadProfiles(gc);setProfiles(d);
  },[gc]);
  const refreshChallenges=useCallback(async()=>{
    const [ch,pr]=await Promise.all([loadChallenges(gc),loadChallengeProgress(gc)]);
    setChallenges(ch);setProgress(pr);
  },[gc]);

  useEffect(()=>{
    refreshCI();refreshPRs();refreshProfiles();refreshChallenges();
    const ciCh=subscribeCI(gc,refreshCI);
    const prCh=subscribePRs(gc,refreshPRs);
    const pfCh=subscribeProfiles(gc,refreshProfiles);
    const chCh=subscribeChallenges(gc,refreshChallenges);
    return ()=>{
      initSB().removeChannel(ciCh);
      initSB().removeChannel(prCh);
      initSB().removeChannel(pfCh);
      initSB().removeChannel(chCh);
    };
  },[gc]);

  const navItems=[
    {id:'dnes',label:'Dnes',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
    {id:'skore',label:'Skore',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
    {id:'vyzvy',label:'Vyzvy',icon:<IcoTarget/>},
    {id:'ja',label:'Ja',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},
    {id:'parta',label:'Parta',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>},
  ];

  return <div style={{height:'100vh',display:'flex',flexDirection:'column',background:C.bg}}>
    {tab==='dnes'&&<TodayView gc={gc} member={member} checkins={checkins} profiles={profiles} refreshCI={refreshCI}/>}
    {tab==='skore'&&<ScoreView gc={gc} member={member} checkins={checkins} profiles={profiles}/>}
    {tab==='vyzvy'&&<ChallengesView gc={gc} member={member} challenges={challenges} progress={progress} profiles={profiles} refreshChallenges={refreshChallenges}/>}
    {tab==='ja'&&<MeView gc={gc} member={member} checkins={checkins} prs={prs} profiles={profiles} refreshProfiles={refreshProfiles}/>}
    {tab==='parta'&&<SquadView gc={gc} checkins={checkins} profiles={profiles}/>}

    <nav className="nav">
      {navItems.map(n=><div key={n.id} className={`nav-btn${tab===n.id?' on':''}`} onClick={()=>setTab(n.id)}>
        <span className="nav-ico">{n.icon}</span>
        <span className="nav-lbl">{n.label}</span>
      </div>)}
    </nav>
  </div>;
}

// --- Root ---
function App(){
  const [authed,setAuthed]=useState(()=>localStorage.getItem('sg_authed')==='1');
  const [member,setMember]=useState(()=>localStorage.getItem('sg_member')||null);
  const [profiles,setProfiles]=useState([]);
  const GC='sg_default';

  useEffect(()=>{
    if(authed)loadProfiles(GC).then(setProfiles);
  },[authed]);

  const handleAuth=()=>{localStorage.setItem('sg_authed','1');setAuthed(true);};
  const handleMember=m=>{localStorage.setItem('sg_member',m);setMember(m);};
  const handleLogout=()=>{localStorage.removeItem('sg_member');setMember(null);};

  if(!authed)return <PinScreen onAuth={handleAuth}/>;
  if(!member)return <MemberSelect onSelect={handleMember} profiles={profiles}/>;
  return <MainApp gc={GC} member={member} onLogout={handleLogout}/>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
